name: Build Android

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'LibertyRecomp/**'
      - 'LibertyRecompLib/**'
      - 'toolchains/android.cmake'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'android/**'
      - '.github/workflows/build-android.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ANDROID_NDK_VERSION: '25.2.9519653'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Build Android (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: ["android-debug", "android-release"]
        abi: ["arm64-v8a"]
    env:
      CMAKE_PRESET: ${{ matrix.preset }}
      ANDROID_ABI: ${{ matrix.abi }}
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-android-${{ matrix.preset }}-${{ matrix.abi }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Prepare Project Assets
        shell: bash
        run: |
          if [ -n "${ASSET_REPO}" ] && [ -n "${ASSET_REPO_TOKEN}" ]; then
            mkdir -p ./private
            auth_b64="$(printf 'x-access-token:%s' "${ASSET_REPO_TOKEN}" | base64)"
            git -c http.extraHeader="AUTHORIZATION: basic ${auth_b64}" clone --depth 1 "https://github.com/${ASSET_REPO}.git" ./private
            mkdir -p ./LibertyRecompLib/private
            cp ./private/* ./LibertyRecompLib/private
          else
            mkdir -p ./LibertyRecompLib/private
            touch ./LibertyRecompLib/private/.gitkeep
          fi

      - name: Prepare Game Payload
        shell: bash
        run: |
          mkdir -p tools/local_game_payload
          echo "Note: Game payload should be staged here for full builds"
          # TODO: Download from secure storage in production CI

      - name: Configure Project (CMake)
        run: |
          cmake --preset ${{ env.CMAKE_PRESET }} \
            -DANDROID_ABI=${{ env.ANDROID_ABI }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Native Library
        run: |
          cmake --build ./out/build/${{ env.CMAKE_PRESET }} --target LibertyRecomp

      - name: Build APK with Gradle
        if: matrix.preset == 'android-release'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Build APK with Gradle (Debug)
        if: matrix.preset == 'android-debug'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Sign APK (Release only)
        if: matrix.preset == 'android-release' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            "$KEY_ALIAS"
          zipalign -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk \
            LibertyRecomp-Android.apk
          rm release.keystore

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-Android-${{ matrix.preset }}-${{ matrix.abi }}
          path: |
            ${{ matrix.preset == 'android-release' && 'LibertyRecomp-Android.apk' || 'android/app/build/outputs/apk/debug/app-debug.apk' }}
          retention-days: 7

      - name: Upload Native Library
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-Android-Native-${{ matrix.preset }}-${{ matrix.abi }}
          path: out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/
          retention-days: 7

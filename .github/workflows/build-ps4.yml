name: Build PS4

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'LibertyRecomp/**'
      - 'LibertyRecompLib/**'
      - 'toolchains/ps4-openorbis.cmake'
      - 'tools/OpenOrbis-PS4-Toolchain/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-ps4.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: 18

jobs:
  build-ps4:
    name: Build PS4 (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: ["ps4-debug", "ps4-release"]
    env:
      CMAKE_PRESET: ${{ matrix.preset }}
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM/Clang
        run: |
          sudo apt update
          sudo apt install -y llvm-${{ env.LLVM_VERSION }} clang-${{ env.LLVM_VERSION }} lld-${{ env.LLVM_VERSION }}
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${{ env.LLVM_VERSION }} 100
          sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-${{ env.LLVM_VERSION }} 100

      - name: Verify LLVM Installation
        run: |
          clang --version
          lld --version
          which clang
          which lld

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-ps4-${{ matrix.preset }}

      - name: Cache ccache Directory
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-ps4-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            ccache-ps4-${{ matrix.preset }}-

      - name: Prepare Project Assets
        shell: bash
        run: |
          if [ -n "${ASSET_REPO}" ] && [ -n "${ASSET_REPO_TOKEN}" ]; then
            mkdir -p ./private
            auth_b64="$(printf 'x-access-token:%s' "${ASSET_REPO_TOKEN}" | base64)"
            git -c http.extraHeader="AUTHORIZATION: basic ${auth_b64}" clone --depth 1 "https://github.com/${ASSET_REPO}.git" ./private
            mkdir -p ./LibertyRecompLib/private
            cp ./private/* ./LibertyRecompLib/private
          else
            mkdir -p ./LibertyRecompLib/private
            touch ./LibertyRecompLib/private/.gitkeep
          fi

      - name: Prepare Game Payload
        shell: bash
        run: |
          mkdir -p tools/local_game_payload
          echo "Note: Game payload should be staged here for full builds"
          # TODO: Download from secure storage in production CI

      - name: Setup OpenOrbis Toolchain
        run: |
          export OO_PS4_TOOLCHAIN="$(pwd)/tools/OpenOrbis-PS4-Toolchain"
          echo "OO_PS4_TOOLCHAIN=$OO_PS4_TOOLCHAIN" >> $GITHUB_ENV
          ls -la $OO_PS4_TOOLCHAIN/include/ || echo "Warning: OpenOrbis headers not found"

      - name: Install Ninja
        run: |
          sudo apt install -y ninja-build

      - name: Configure Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          cmake --preset ${{ env.CMAKE_PRESET }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          cmake --build ./out/build/${{ env.CMAKE_PRESET }} --target LibertyRecomp

      - name: Package PS4 PKG (Release only)
        if: matrix.preset == 'ps4-release'
        run: |
          # TODO: Implement PKG packaging using LibOrbisPkg
          # This would create a .pkg file for PS4 installation
          mkdir -p pkg_output
          echo "PKG packaging script would run here"
          # Example structure:
          # - Copy eboot.bin to pkg structure
          # - Create param.sfo with title metadata
          # - Run LibOrbisPkg to create .pkg

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-PS4-${{ matrix.preset }}
          path: |
            out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/
          retention-days: 7

      - name: Upload PKG (Release only)
        if: matrix.preset == 'ps4-release'
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-PS4-PKG
          path: pkg_output/
          retention-days: 7

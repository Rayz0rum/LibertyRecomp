name: Build Nintendo Switch

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'LibertyRecomp/**'
      - 'LibertyRecompLib/**'
      - 'toolchains/switch-libnx.cmake'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-switch.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-switch:
    name: Build Switch (${{ matrix.preset }})
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkita64:latest
    strategy:
      matrix:
        preset: ["switch-debug", "switch-release"]
    env:
      CMAKE_PRESET: ${{ matrix.preset }}
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm switch-dev cmake ninja

      - name: Verify devkitPro Installation
        run: |
          echo "DEVKITPRO=$DEVKITPRO"
          echo "DEVKITA64=$DEVKITA64"
          dkp-pacman -Q switch-dev
          ls -la $DEVKITA64/bin/aarch64-none-elf-gcc
          ls -la $DEVKITPRO/libnx/include/switch.h

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-switch-${{ matrix.preset }}

      - name: Cache ccache Directory
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-switch-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            ccache-switch-${{ matrix.preset }}-

      - name: Prepare Project Assets
        shell: bash
        run: |
          if [ -n "${ASSET_REPO}" ] && [ -n "${ASSET_REPO_TOKEN}" ]; then
            mkdir -p ./private
            auth_b64="$(printf 'x-access-token:%s' "${ASSET_REPO_TOKEN}" | base64)"
            git -c http.extraHeader="AUTHORIZATION: basic ${auth_b64}" clone --depth 1 "https://github.com/${ASSET_REPO}.git" ./private
            mkdir -p ./LibertyRecompLib/private
            cp ./private/* ./LibertyRecompLib/private
          else
            mkdir -p ./LibertyRecompLib/private
            touch ./LibertyRecompLib/private/.gitkeep
          fi

      - name: Prepare Game Payload
        shell: bash
        run: |
          mkdir -p tools/local_game_payload
          echo "Note: Game payload should be staged here for full builds"
          # TODO: Download from secure storage in production CI

      - name: Configure Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          cmake --preset ${{ env.CMAKE_PRESET }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          cmake --build ./out/build/${{ env.CMAKE_PRESET }} --target LibertyRecomp

      - name: Create NRO Package
        run: |
          # The build should already produce a .nro file
          # Verify it exists
          if [ -f "./out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/LibertyRecomp.nro" ]; then
            echo "NRO file created successfully"
            ls -lh ./out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/LibertyRecomp.nro
          else
            echo "Warning: NRO file not found"
            find ./out/build/${{ env.CMAKE_PRESET }} -name "*.nro"
          fi

      - name: Create RomFS Archive (Release only)
        if: matrix.preset == 'switch-release'
        run: |
          # Package game assets into RomFS
          mkdir -p romfs
          # TODO: Copy game assets to romfs/ directory
          echo "RomFS packaging would happen here"

      - name: Upload NRO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-Switch-${{ matrix.preset }}
          path: |
            out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/*.nro
          retention-days: 7

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-Switch-Build-${{ matrix.preset }}
          path: |
            out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/
          retention-days: 7

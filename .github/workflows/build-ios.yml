name: Build iOS

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'LibertyRecomp/**'
      - 'LibertyRecompLib/**'
      - 'toolchains/ios.cmake'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/build-ios.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: 18

jobs:
  build-ios:
    name: Build iOS (${{ matrix.preset }})
    runs-on: macos-15
    strategy:
      matrix:
        preset: ["ios-debug", "ios-release"]
    env:
      CMAKE_PRESET: ${{ matrix.preset }}
      ASSET_REPO: ${{ secrets.ASSET_REPO }}
      ASSET_REPO_TOKEN: ${{ secrets.ASSET_REPO_TOKEN }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-ios-${{ matrix.preset }}

      - name: Cache ccache Directory
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-ios-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            ccache-ios-${{ matrix.preset }}-

      - name: Prepare Project Assets
        shell: bash
        run: |
          if [ -n "${ASSET_REPO}" ] && [ -n "${ASSET_REPO_TOKEN}" ]; then
            mkdir -p ./private
            auth_b64="$(printf 'x-access-token:%s' "${ASSET_REPO_TOKEN}" | base64)"
            git -c http.extraHeader="AUTHORIZATION: basic ${auth_b64}" clone --depth 1 "https://github.com/${ASSET_REPO}.git" ./private
            mkdir -p ./LibertyRecompLib/private
            cp ./private/* ./LibertyRecompLib/private
          else
            mkdir -p ./LibertyRecompLib/private
            touch ./LibertyRecompLib/private/.gitkeep
          fi

      - name: Prepare Game Payload
        shell: bash
        run: |
          # For CI, we need to stage game files or use a mock payload
          # This step would normally copy from a secure artifact storage
          mkdir -p tools/local_game_payload
          echo "Note: Game payload should be staged here for full builds"
          # TODO: Download from secure storage in production CI

      - name: Configure Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          cmake --preset ${{ env.CMAKE_PRESET }} \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Build Project
        env:
          CCACHE_DIR: /tmp/ccache
        run: |
          cmake --build ./out/build/${{ env.CMAKE_PRESET }} \
            --target LibertyRecomp \
            --config ${{ matrix.preset == 'ios-release' && 'Release' || 'Debug' }}

      - name: Package IPA (Release only)
        if: matrix.preset == 'ios-release'
        run: |
          # Code signing would happen here with proper certificates
          # For now, we'll just archive the .app bundle
          cd ./out/build/${{ env.CMAKE_PRESET }}
          mkdir -p Payload
          cp -r LibertyRecomp/Liberty\ Recompiled.app Payload/
          zip -r ../../../LibertyRecomp-iOS.ipa Payload/
          cd ../../..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibertyRecomp-iOS-${{ matrix.preset }}
          path: |
            ${{ matrix.preset == 'ios-release' && 'LibertyRecomp-iOS.ipa' || 'out/build/${{ env.CMAKE_PRESET }}/LibertyRecomp/' }}
          retention-days: 7

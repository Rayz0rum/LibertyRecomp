# GTA4 - ReXGlue Codegen Configuration
# Xbox 360 Static Recompilation

# Required settings
project_name = "gta4"
file_path = "assets/default.xex"
out_directory_path = "generated"

# Code Generation Options
skip_lr = false
ctr_as_local = false
xer_as_local = false
reserved_as_local = false
skip_msr = false
cr_as_local = false
non_argument_as_local = false
non_volatile_as_local = false

# Analysis Tuning
[analysis]
max_jump_extension = 65536
data_region_threshold = 16
large_function_threshold = 1048576

# Function overrides — forced entry points for branches the analyzer couldn't resolve
[functions]
# b 0x82154100 from 0x821545A0
"0x82154100" = {}
# b 0x82A05828 from 0x8274D0C0
"0x82A05828" = {}
# b 0x82518A90 from 0x82234E08
"0x82518A90" = {}
# b 0x826EA290 from 0x826EA344
"0x826EA290" = {}

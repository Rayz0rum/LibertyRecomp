# LibertyRecomp - GTA IV Xbox 360 Recompilation Config
# This is the main configuration file for XenonRecomp

[main]
file_path = "../../../gta_iv/default.xex"
out_directory_path = "../../glue/rexglue-sdk-main/gta4-recomp/generated"
switch_table_file_path = "./gta4_switch_tables.toml"

# Optimizations - disabled until we have a working build
skip_lr = false
skip_msr = false
ctr_as_local = false
xer_as_local = false
reserved_as_local = false
cr_as_local = false
non_argument_as_local = false
non_volatile_as_local = false

# Register save/restore function addresses
# Found using FindPatterns tool on GTA IV XEX
restgprlr_14_address = 0x8298EB30
savegprlr_14_address = 0x8298EAE0
restfpr_14_address = 0x8299015C
savefpr_14_address = 0x82990110
restvmx_14_address = 0x82990598
savevmx_14_address = 0x82990300
restvmx_64_address = 0x8299062C
savevmx_64_address = 0x82990394

# setjmp/longjmp addresses (if used by the game)
# longjmp_address = 0x00000000
# setjmp_address = 0x00000000

# Explicit function boundaries for functions with jump tables
# that XenonAnalyse couldn't detect correctly
# Also includes functions that branch into other functions (tail call optimization)
#
# These are typically CRT string/memory functions with optimized loops
# that share common loop bodies across multiple entry points
functions = [
    # strncmp-like function that branches into its own continuation
    # sub_82990020 branches to loc_82990048 which is in sub_82990048
    { address = 0x82990020, size = 0x50 }, # Covers 0x82990020 to 0x82990070
    
    # Memcpy-like functions with shared loop bodies
    # sub_82990830 branches to 0x82990894 which is in sub_82990880
    # These functions share control flow between multiple entry points
    # Covering the range: 0x82990830 to 0x8299094C (and beyond)
    { address = 0x82990830, size = 0x11C }, # Covers 0x82990830 to 0x8299094C
    
    # Additional memcpy functions (sub_8299094C through sub_82990CB8) have interrelated branches
    # Covering the entire range: 0x8299094C to 0x82990CC8
    { address = 0x8299094C, size = 0x37C }, # Covers 0x8299094C to 0x82990CC8
]

# Invalid instruction patterns to skip
invalid_instructions = [
    { data = 0x00000000, size = 4 }, # Padding
]

# =============================================================================
# Mid-asm hooks for intercepting game functions
# =============================================================================
# Format:
# [[midasm_hook]]
# name = "FunctionName"            # C++ function to call
# address = 0x82XXXXXX             # Address in guest code to hook
# registers = ["r3", "r4"]         # Registers to pass to hook function
# after_instruction = true/false   # Hook after vs before instruction
# jump_address = 0x82XXXXXX        # Optional: jump to this address after hook
# jump_address_on_true = 0x82XXXX  # Jump if hook returns true
# jump_address_on_false = 0x82XXX  # Jump if hook returns false

# =============================================================================
# LOD and Render Distance Hooks
# =============================================================================
# These hooks allow modification of the game's LOD system to increase
# draw distances and reduce model pop-in.

# Hook for LOD multiplier calculation (sub_822F6B40)
# This function calculates height-based LOD multipliers each frame
# We hook after the final store to flt_82A2E908 to apply our multiplier
[[midasm_hook]]
name = "LODMultiplierCalculationHook"
address = 0x822F6D30
registers = ["f12"]
after_instruction = true

# Hook for render settings application (sub_822F4EC0)  
# This function applies LOD multipliers to the render settings buffer
# We hook where it multiplies the far clip distance
[[midasm_hook]]
name = "RenderSettingsApplyHook"
address = 0x822F4F70
registers = ["f0", "f13"]

# Hook for streaming distance initialization (sub_824E5148)
# This function initializes the IplStore with streaming distance
# f1 register contains the distance value (default 200.0)
[[midasm_hook]]
name = "StreamingDistanceInitHook"
address = 0x824E5154
registers = ["f1"]
